<div (click)="onTaskClick()"
  class="bg-white rounded-xl ring-1 ring-gray-200 p-4 cursor-pointer hover:ring-indigo-300 hover:shadow-md hover:-translate-y-0.5 transition-all duration-200 group border-l-[3px]"
  [ngClass]="priorityBorderClass">

  <!-- Top row: Status badge + Priority tag -->
  <div class="flex items-center justify-between mb-2.5">
    <app-status-badge [status]="task().status" />
    <app-priority-tag [priority]="priorityLabel" />
  </div>

  <!-- Title -->
  <h4 class="text-sm font-semibold text-gray-900 group-hover:text-indigo-600 transition-colors leading-snug mb-1.5">
    {{ task().title }}
  </h4>

  <!-- Description -->
  <p class="text-xs text-gray-500 line-clamp-2 mb-3 leading-relaxed">
    {{ task().description || 'No description provided' }}
  </p>

  <!-- Footer: Assignee + Meta -->
  <div class="flex items-center justify-between">
    <!-- Assignee avatar -->
    <div class="flex items-center gap-2">
      <div class="size-6 rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 ring-2 ring-white flex items-center justify-center text-[9px] font-bold text-white shadow-sm">
        {{ assigneeInitial }}
      </div>
      <span class="text-[11px] text-gray-400 font-medium">Assignee</span>
    </div>

    <!-- Due date + Comments -->
    <div class="flex items-center gap-3 text-[11px]">
      <!-- Due Date -->
      @if (task().dueDate) {
        <div class="flex items-center gap-1" [ngClass]="{ 'text-rose-500 font-medium': isOverdue(task().dueDate), 'text-gray-400': !isOverdue(task().dueDate) }">
          <svg class="size-3" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>{{ getDueDateLabel(task().dueDate) }}</span>
        </div>
      }
      <!-- Comments count -->
      @if (task().comments && task().comments!.length > 0) {
        <div class="flex items-center gap-1 text-gray-400">
          <svg class="size-3" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 01.865-.501 48.172 48.172 0 003.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0012 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018z" />
          </svg>
          <span>{{ task().comments!.length }}</span>
        </div>
      }
    </div>
  </div>
</div>
