<div
    class="bg-white rounded-xl ring-1 ring-gray-200 overflow-hidden hover:shadow-lg transition-all duration-200 group cursor-pointer">
    <div class="h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
    <div class="p-5">
        <div class="flex items-start justify-between mb-3">
            <h3 class="font-semibold text-gray-900 group-hover:text-indigo-600 transition-colors"><ng-content select=[title]/></h3>
            <span
                class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200">
                <ng-content select=[status]/>
            </span>
        </div>
        <p class="text-sm text-gray-500 line-clamp-2 mb-4"><ng-content select=[description]/></p>
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="flex -space-x-2">
                    <div
                        class="size-7 rounded-full bg-indigo-500 ring-2 ring-white flex items-center justify-center text-[10px] font-semibold text-white">
                        AK</div>
                    <div
                        class="size-7 rounded-full bg-emerald-500 ring-2 ring-white flex items-center justify-center text-[10px] font-semibold text-white">
                        JR</div>
                    <div
                        class="size-7 rounded-full bg-amber-500 ring-2 ring-white flex items-center justify-center text-[10px] font-semibold text-white">
                        SP</div>
                </div>
            </div>
            <div class="flex items-center gap-1.5 text-xs text-gray-400">
                <svg class="size-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span><ng-content select=[numberOfTaskCompleted]/></span>
            </div>
        </div>
    </div>
</div>
