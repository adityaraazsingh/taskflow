<div class="flex items-center justify-between px-4 py-3 sm:px-6">
  <div class="flex flex-1 justify-between sm:hidden">
    <button (click)="prevPage()" [disabled]="currentPage === 0"
      class="relative inline-flex items-center rounded-lg px-4 py-2 text-sm font-medium text-gray-700 bg-white ring-1 ring-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200">
      Previous
    </button>
    <button (click)="nextPage()" [disabled]="currentPage >= totalPages - 1"
      class="relative ml-3 inline-flex items-center rounded-lg px-4 py-2 text-sm font-medium text-gray-700 bg-white ring-1 ring-gray-300 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200">
      Next
    </button>
  </div>
  <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
    <div>
      <p class="text-sm text-gray-600">
        Page <span class="font-semibold text-gray-900">{{ currentPage + 1 }}</span> of <span class="font-semibold text-gray-900">{{ totalPages }}</span>
        <span class="mx-1.5 text-gray-300">·</span>
        <span class="font-semibold text-gray-900">{{ totalItems }}</span> total items
      </p>
    </div>
    <div>
      <nav class="isolate inline-flex -space-x-px rounded-lg shadow-xs" aria-label="Pagination">
        <button (click)="prevPage()" [disabled]="currentPage === 0"
          class="relative inline-flex items-center rounded-l-lg px-3 py-2 text-gray-400 ring-1 ring-gray-300 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200">
          <svg class="size-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd"/></svg>
        </button>
        @for (page of pageNumbers; track page) {
          <button (click)="goToPage(page - 1)"
            class="relative inline-flex items-center px-4 py-2 text-sm font-semibold ring-1 ring-gray-300 transition-all duration-200"
            [ngClass]="page - 1 === currentPage ? 'z-10 bg-indigo-600 text-white ring-indigo-600 focus-visible:outline-2 focus-visible:outline-indigo-600' : 'text-gray-900 hover:bg-gray-50'">
            {{ page }}
          </button>
        }
        <button (click)="nextPage()" [disabled]="currentPage >= totalPages - 1"
          class="relative inline-flex items-center rounded-r-lg px-3 py-2 text-gray-400 ring-1 ring-gray-300 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200">
          <svg class="size-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z" clip-rule="evenodd"/></svg>
        </button>
      </nav>
    </div>
  </div>
</div>
