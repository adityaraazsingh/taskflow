<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium transition-all duration-200" [ngClass]="{
    'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200': status === 'ACTIVE' || status === 'DONE',
    'bg-amber-50 text-amber-700 ring-1 ring-amber-200': status === 'IN_PROGRESS' || status === 'TODO',
    'bg-gray-50 text-gray-600 ring-1 ring-gray-200': status === 'ARCHIVED',
    'bg-blue-50 text-blue-700 ring-1 ring-blue-200': status === 'COMPLETED'
  }">
  <span class="w-1.5 h-1.5 rounded-full" [ngClass]="{
    'bg-emerald-500': status === 'ACTIVE' || status === 'DONE',
    'bg-amber-500': status === 'IN_PROGRESS' || status === 'TODO',
    'bg-gray-400': status === 'ARCHIVED',
    'bg-blue-500': status === 'COMPLETED'
  }"></span>
  {{ status | titlecase }}
</span>
