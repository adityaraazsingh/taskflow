<div class="bg-white rounded-2xl ring-1 ring-gray-200 p-6 sm:p-8 shadow-xl">
  <!-- Header -->
  <div class="mb-6">
    <div class="flex items-center justify-between mb-2">
      <h1 class="text-xl font-bold text-gray-900 tracking-tight">{{ isEdit ? 'Edit Task' : 'Create New Task' }}</h1>
      <button (click)="closingAddingTaskDialog($event)" class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-all duration-200">
        <svg class="size-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <p class="text-sm text-gray-500">{{ isEdit ? 'Update task details and save changes.' : 'Add a new task to the project.' }}</p>
  </div>

  <!-- Form -->
  <form class="space-y-5" [formGroup]="taskForm" (ngSubmit)="submitTaskForm()">
    <!-- Title -->
    <div>
      <label for="task-title" class="block text-sm font-medium text-gray-700 mb-1.5">Task Title</label>
      <input id="task-title" type="text" required placeholder="Enter task title"
        class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200"
        formControlName="title" />
    </div>

    <!-- Description -->
    <div>
      <label for="task-desc" class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
      <textarea id="task-desc" rows="4" placeholder="Describe what needs to be done, acceptance criteria, or any relevant details..."
        class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200 resize-none"
        formControlName="description"></textarea>
    </div>

    <!-- Grid Fields -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Status -->
      <div>
        <label for="task-status" class="block text-sm font-medium text-gray-700 mb-1.5">Status</label>
        <div class="relative">
          <select id="task-status"
            class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200 appearance-none bg-white"
            formControlName="status">
            <option>TODO</option>
            <option>IN_PROGRESS</option>
            <option>DONE</option>
          </select>
          <svg class="absolute right-3 top-1/2 -translate-y-1/2 size-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        </div>
      </div>

      <!-- Priority -->
      <div>
        <label for="task-priority" class="block text-sm font-medium text-gray-700 mb-1.5">Priority</label>
        <div class="relative">
          <select id="task-priority"
            class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200 appearance-none bg-white"
            formControlName="priority">
            <option>LOW</option>
            <option selected>MED</option>
            <option>HIGH</option>
          </select>
          <svg class="absolute right-3 top-1/2 -translate-y-1/2 size-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        </div>
      </div>

      <!-- Due Date -->
      <div class="sm:col-span-2">
        <label for="task-duedate" class="block text-sm font-medium text-gray-700 mb-1.5">Due Date</label>
        <div class="relative max-w-xs">
          <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
            <svg class="size-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
            </svg>
          </div>
          <input id="task-duedate" type="date"
            class="block w-full rounded-xl border-0 py-2.5 pl-10 pr-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200"
            formControlName="duedate" />
        </div>
      </div>
    </div>

    <!-- Form Actions -->
    <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
      <button (click)="closingAddingTaskDialog($event)" type="button"
        class="inline-flex items-center justify-center rounded-xl px-5 py-2.5 text-sm font-medium text-gray-700 bg-white ring-1 ring-gray-300 hover:bg-gray-50 transition-all duration-200">
        Cancel
      </button>
      <button type="submit"
        class="inline-flex items-center justify-center rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 hover:shadow-md active:scale-95 transition-all duration-200">
        <svg class="size-4 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        {{ isEdit ? 'Update Task' : 'Create Task' }}
      </button>
    </div>
  </form>
</div>
