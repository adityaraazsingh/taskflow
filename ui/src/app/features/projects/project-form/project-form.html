
<div class="bg-white rounded-2xl ring-1 ring-gray-200 p-6 sm:p-8 shadow-xl">
  <!-- Header -->
  <div class="mb-6">
    <div class="flex items-center justify-between mb-2">
      <h1 class="text-xl font-bold text-gray-900 tracking-tight">{{ isEdit ? 'Edit Project' : 'Create New Project' }}</h1>
      <button (click)="closingDialog($event)" type="button"
        class="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-all duration-200">
        <svg class="size-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <p class="text-sm text-gray-500">{{ isEdit ? 'Update your project details and save changes.' : 'Set up a new project to start tracking tasks and collaborate with your team.' }}</p>
  </div>

  <!-- Form -->
  <form class="space-y-5" [formGroup]="projectForm" (ngSubmit)="submitProjectForm()">
    <!-- Project Name -->
    <div>
      <label for="project-name" class="block text-sm font-medium text-gray-700 mb-1.5">Project Name</label>
      <input id="project-name" type="text" required placeholder="Enter project name"
        class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200"
        formControlName="name" />
    </div>

    <!-- Description -->
    <div>
      <label for="project-desc" class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
      <textarea id="project-desc" rows="4" required placeholder="Describe the project's goals, scope, and any relevant context..."
        class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200 resize-none"
        formControlName="description"></textarea>
      <p class="mt-1 text-xs text-gray-400">Briefly describe what this project is about.</p>
    </div>

    <!-- Status & Theme Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <!-- Status -->
      <div>
        <label for="project-status" class="block text-sm font-medium text-gray-700 mb-1.5">Status</label>
        <div class="relative">
          <select id="project-status"
            class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200 appearance-none bg-white"
            formControlName="status">
            <option value="TODO">To Do</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="DONE">Completed</option>
          </select>
          <svg class="absolute right-3 top-1/2 -translate-y-1/2 size-4 text-gray-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
          </svg>
        </div>
      </div>

      <!-- Accent Color -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2.5">Accent Color</label>
        <div class="flex gap-3 items-center h-10">
          @for (color of colors; track color.value) {
            <button type="button" (click)="selectedColor.set(color.value)"
              class="size-9 rounded-xl {{ color.class }} transition-all duration-200 hover:scale-110"
              [class.ring-2]="selectedColor() === color.value"
              [class.ring-offset-2]="selectedColor() === color.value"
              [class]="selectedColor() === color.value ? color.ring : 'ring-2 ring-transparent'">
            </button>
          }
        </div>
      </div>
    </div>

    <!-- Form Actions -->
    <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
      <button (click)="closingDialog($event)" type="button"
        class="inline-flex items-center justify-center rounded-xl px-5 py-2.5 text-sm font-medium text-gray-700 bg-white ring-1 ring-gray-300 hover:bg-gray-50 transition-all duration-200">
        Cancel
      </button>
      <button type="submit" [disabled]="projectForm.invalid || submitting()"
        class="inline-flex items-center justify-center rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 hover:shadow-md active:scale-95 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed disabled:active:scale-100">
        @if (submitting()) {
          <svg class="size-4 mr-2 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
          </svg>
          Saving...
        } @else {
          <svg class="size-4 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          {{ isEdit ? 'Save Changes' : 'Create Project' }}
        }
      </button>
    </div>
  </form>
</div>
