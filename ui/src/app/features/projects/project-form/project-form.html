<div class="max-w-2xl mx-auto">
  <!-- Header -->
  <div class="mb-8">
    <div class="flex items-center gap-2 text-sm text-gray-500 mb-2">
      <a routerLink="/dashboard" class="hover:text-indigo-600 transition-colors">Dashboard</a>
      <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
      </svg>
      <span class="text-gray-900 font-medium">{{ isEdit ? 'Edit Project' : 'New Project' }}</span>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">{{ isEdit ? 'Edit Project' : 'Create New Project' }}</h1>
    <p class="mt-1 text-sm text-gray-500">{{ isEdit ? 'Update your project details' : 'Set up a new project to start tracking tasks' }}</p>
  </div>

  <!-- Form Card -->
  <div class="bg-white rounded-2xl ring-1 ring-gray-200 p-6 sm:p-8">
    <form class="space-y-6">
      <!-- Project Name -->
      <div>
        <label for="project-name" class="block text-sm font-medium text-gray-700 mb-1.5">Project Name</label>
        <input id="project-name" type="text" required placeholder="Enter project name"
          class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200" />
        <p class="mt-1 text-xs text-gray-400">Give your project a clear, descriptive name.</p>
      </div>

      <!-- Description -->
      <div>
        <label for="project-desc" class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
        <textarea id="project-desc" rows="4" required placeholder="Describe the project's goals and scope..."
          class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200 resize-none"></textarea>
        <p class="mt-1 text-xs text-gray-400">Briefly describe what this project is about.</p>
      </div>

      <!-- Status -->
      <div>
        <label for="project-status" class="block text-sm font-medium text-gray-700 mb-1.5">Status</label>
        <select id="project-status"
          class="block w-full rounded-xl border-0 py-2.5 px-3.5 text-gray-900 ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm transition-all duration-200">
          <option>TODO</option>
          <option selected>ACTIVE</option>
          <option>COMPLETED</option>
          <option>ARCHIVED</option>
        </select>
      </div>

      <!-- Color Theme -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2.5">Accent Color</label>
        <div class="flex gap-3">
          <button type="button" class="size-9 rounded-xl bg-indigo-500 ring-2 ring-offset-2 ring-indigo-500 transition-all duration-200 hover:scale-110"></button>
          <button type="button" class="size-9 rounded-xl bg-emerald-500 ring-2 ring-transparent hover:ring-emerald-500 hover:ring-offset-2 transition-all duration-200 hover:scale-110"></button>
          <button type="button" class="size-9 rounded-xl bg-amber-500 ring-2 ring-transparent hover:ring-amber-500 hover:ring-offset-2 transition-all duration-200 hover:scale-110"></button>
          <button type="button" class="size-9 rounded-xl bg-rose-500 ring-2 ring-transparent hover:ring-rose-500 hover:ring-offset-2 transition-all duration-200 hover:scale-110"></button>
          <button type="button" class="size-9 rounded-xl bg-purple-500 ring-2 ring-transparent hover:ring-purple-500 hover:ring-offset-2 transition-all duration-200 hover:scale-110"></button>
          <button type="button" class="size-9 rounded-xl bg-sky-500 ring-2 ring-transparent hover:ring-sky-500 hover:ring-offset-2 transition-all duration-200 hover:scale-110"></button>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
        <button type="button" class="inline-flex items-center justify-center rounded-xl px-5 py-2.5 text-sm font-medium text-gray-700 bg-white ring-1 ring-gray-300 hover:bg-gray-50 transition-all duration-200">
          Cancel
        </button>
        <button type="submit"
          class="inline-flex items-center justify-center rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 transition-all duration-200">
          <svg class="size-4 mr-2" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          {{ isEdit ? 'Save Changes' : 'Create Project' }}
        </button>
      </div>
    </form>
  </div>
</div>
